seed: 123
env_config: configs/env.yaml
train_config: configs/train.yaml
checkpoint: outputs/train/initial_dcbf/best.pt
dataset_glob: outputs/data/train_*.npz
output_dir: outputs/refine
near_boundary_delta: 0.1
max_refine_states: 400
rollout_steps: 4
candidate_actions: 64
top_m_objects: 4
finetune:
  epochs: 50
  lr: 0.0001
  eta_s: 1.0
  eta_u: 5.0
  eta_d: 2.0              # refinement阶段加大导数约束，收紧边界
  gamma: 0.1
  sigma: 0.02
  run_name: refined_dcbf
